<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>PickAgain - 검색</title>
    <link rel="stylesheet" href="layout.css">
    <style>
        /* ==========================================
           ★ 위시 메모장 위젯 전용 CSS (좌측 하단)
           ========================================== */
        #memo-widget {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            font-family: 'Pretendard', sans-serif;
        }

        #memo-toggle-btn {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s, background-color 0.3s;
        }

        #memo-toggle-btn:hover {
            transform: scale(1.05);
        }

        #memo-panel {
            display: none; 
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 500px;
        }

        .memo-header {
            background: #f39c12;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memo-header h4 { margin: 0; font-size: 16px; }
        .memo-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        .memo-input-area { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        .memo-input-area input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .memo-input-area button { width: 100%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        #memo-list { list-style: none; margin: 0; padding: 0; max-height: 120px; overflow-y: auto; }
        #memo-list li { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; align-items: center;}
        .memo-del-btn { color: #e74c3c; cursor: pointer; font-weight: bold; border: none; background: none; font-size: 16px; }

        #memo-match-area { background: #eef2ff; padding: 15px; flex: 1; overflow-y: auto; }
        #memo-match-area h5 { margin: 0 0 10px 0; color: #4b6cb7; }
        #memo-match-list { list-style: none; margin: 0; padding: 0; }
        #memo-match-list li { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #memo-match-list li a { color: #2c3e50; font-weight: bold; text-decoration: none; }

        /* 다크모드 대응 */
        body.dark-mode #memo-panel { background: #1e1e1e; border-color: #333; }
        body.dark-mode .memo-input-area { background: #2a2a2a; border-color: #444; }
        body.dark-mode .memo-input-area input { background: #1e1e1e; color: white; border-color: #555; }
        body.dark-mode #memo-list li { border-color: #444; color: #a4b0be; }
        body.dark-mode #memo-match-area { background: #2c3e50; }
        body.dark-mode #memo-match-list li { background: #1e1e1e; color: #f1f2f6; border: 1px solid #444; }
        body.dark-mode #memo-match-list li a { color: #55efc4; }
    </style>
</head>

<body>
    <script>
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>

    <div class="navbar">
        <a href="login.html">Login/Sign Up</a>
    </div>

    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title">
                    <a href="main.html">PickAgain</a>
                </h2>
            </div>
            <input type="text" id="keyword" placeholder="상품명 또는 매장명을 검색해 보세요" autocomplete="off">
            <button id="searchBtn">검색</button>
            <button id="detailToggleBtn" class="detail-toggle-btn">상세 검색 ▼</button>
            <button class="alert-btn" onclick="location.href='alerts.html'">알림</button>
            <button class="map-btn" onclick="location.href='map.html'">지도</button>
            <button id="chatbot-fab" style="background-color: #2c3e50; color: white; border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: 10px; height: 38px;">
                AI 상담
            </button>
            <button id="darkModeBtn" style="background: transparent; border: none; font-size: 24px; cursor: pointer; margin-left: 10px; transition: transform 0.3s;">
                🌙
            </button>
        </div>

        <div class="detail-search-panel" id="detailSearchPanel" style="display: none;">
            <div class="ds-row">
                <div class="ds-group">
                    <label>대분류</label>
                    <select id="ds-type" onchange="updateDsSubCategory()">
                        <option value="">전체</option>
                        <option value="식품">식품</option>
                        <option value="가전">가전/디지털</option>
                        <option value="가구">가구/인테리어</option>
                        <option value="의류">의류/잡화</option>
                        <option value="생활">생활용품</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>상세 카테고리</label>
                    <select id="ds-type-detail">
                        <option value="">대분류를 선택하세요</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>상품 상태</label>
                    <select id="ds-status">
                        <option value="">전체</option>
                        <option value="단순변심 반품">단순변심 반품</option>
                        <option value="포장 훼손">포장 훼손</option>
                        <option value="스크래치/흠집">스크래치/흠집</option>
                        <option value="유통기한 임박">유통기한 임박</option>
                        <option value="기능 고장">기능 고장</option>
                        <option value="전시 상품">전시 상품</option>
                    </select>
                </div>
            </div>

            <div class="ds-row">
                <div class="ds-group">
                    <label>소비기한 유무</label>
                    <select id="ds-expiry-type">
                        <option value="">상관없음</option>
                        <option value="has">소비기한 있음</option>
                        <option value="none">소비기한 없음</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>소비기한 (이 날짜 이전)</label>
                    <input type="date" id="ds-expiry-date">
                </div>
                <div class="ds-group">
                    <label>가격대 (원)</label>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" id="ds-min-price" placeholder="최소" style="width: 45%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <span>~</span>
                        <input type="number" id="ds-max-price" placeholder="최대" style="width: 45%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>
            </div>
            
            <div class="ds-footer" style="text-align: right; border-top: 1px dashed #ddd; padding-top: 15px; margin-top: 10px;">
                <button class="creat_btn" id="executeDetailBtn" style="padding: 10px 40px;">조건 적용하기</button>
            </div>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ad-column-left">
            <aside class="ad-slot ad-slot-left">
                <p style="text-align: center; color: #999;">(왼쪽 광고)</p>
            </aside>
        </div>

        <main class="main-content">
            <div class="results" id="results"></div>
            <div class="list-control-bar">
                <button id="backToShopBtn" class="back-btn" onclick="location.href='shop.html'">
                    <i class="fa-solid fa-arrow-left"></i> 매장 목록으로 돌아가기
                </button>
                <div class="sort-options">
                    <select id="sortSelect" onchange="executeDetailedSearch()">
                        <option value="latest">최신 등록순</option>
                        <option value="priceLow">가격 낮은순</option>
                        <option value="priceHigh">가격 높은순</option>
                    </select>
                </div>
            </div>
            <div class="content" id="content"></div>
            <div class="button-container">
                <a class="creat_btn" href="product-form.html">새글</a>
            </div>
        </main>

        <div class="ad-column-right">
            <aside class="ad-slot ad-slot-right">
                <p style="text-align: center; color: #999;">(오른쪽 광고)</p>
            </aside>
        </div>
    </div>
        
    <div id="chatbot-window" class="chatbot-window" style="display: none;">
        <div class="chatbot-header">
            <h3 style="margin: 0; font-size: 16px;">PickAgain AI 매니저</h3>
            <button id="chatbot-close" class="chatbot-close">&times;</button>
        </div>
        
        <div id="chatbot-messages" class="chatbot-messages">
            <div class="message bot-message">
                안녕하세요. 무엇이든 물어보세요.<br>
                <span style="font-size: 12px; color: #666;">(예: "10만원대 가성비 냉장고 찾아줘")</span>
            </div>
        </div>
        
        <div class="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button id="chatbot-send">전송</button>
        </div>
    </div>

    <div id="memo-widget">
        <div id="memo-panel">
            <div class="memo-header">
                <h4>📝 위시 메모 & 알리미</h4>
                <button id="memo-close-btn">&times;</button>
            </div>
            
            <div class="memo-input-area">
                <input type="text" id="memo-keyword" placeholder="상품명 (예: 냉장고)" autocomplete="off">
                <input type="number" id="memo-max-price" placeholder="희망 최대 가격 (선택사항)" autocomplete="off">
                <button id="memo-add-btn">메모 저장하기</button>
            </div>

            <ul id="memo-list"></ul>

            <div id="memo-match-area">
                <h5>✨ 조건에 맞는 상품 발견!</h5>
                <ul id="memo-match-list"></ul>
            </div>
        </div>
        <button id="memo-toggle-btn">📝 위시 메모</button>
    </div>
    
    <script>
        // 1. 전역 변수 및 설정
        const backendURL = 'https://pickagain-backend-1.onrender.com';
        let allProducts = []; 
        let currentStoreContext = null;

        // --- ★ 로그인 상태 확인 및 상단바 변경 ★ ---
        const currentUser = localStorage.getItem("username");
        const userRole = localStorage.getItem("userRole"); 
        const navbar = document.querySelector(".navbar");

        if (currentUser) {
            const adminLink = userRole === 'admin' 
                ? `<a href="admin.html" style="color: #55efc4; margin-right: 15px; font-weight: bold;">[관리자 대시보드]</a>` 
                : "";

            navbar.innerHTML = `
                ${adminLink}
                <span style="color: white; margin-right: 15px;">환영합니다, <strong>${currentUser}</strong>님!</span>
                <a href="#" id="logoutBtn" style="color: #ffd700; font-weight: bold;">로그아웃</a>
            `;
            
            document.getElementById("logoutBtn").addEventListener("click", function(e) {
                e.preventDefault();
                localStorage.clear(); 
                alert("로그아웃 되었습니다.");
                location.reload(); 
            });
        }

        // --- ★ 비로그인 시 '새글' 버튼 클릭 차단 ★ ---
        document.addEventListener("DOMContentLoaded", () => {
            const newPostBtn = document.querySelector(".creat_btn[href='product-form.html']");
            if (newPostBtn) {
                newPostBtn.addEventListener("click", function(e) {
                    if (!currentUser) {
                        e.preventDefault(); 
                        alert("로그인이 필요한 기능입니다.");
                        location.href = "login.html";
                    }
                });
            }
        });

        // 상세 검색 카테고리 데이터
        const categoryData = {
            "식품": ["가공식품", "신선식품 (과일/채소)", "축산/수산물", "음료/생수", "건강기능식품", "과자/간식"],
            "가전": ["주방가전 (냉장고/밥솥)", "생활가전 (세탁기/청소기)", "계절가전 (에어컨/선풍기)", "영상가전 (TV/모니터)", "음향가전 (스피커/이어폰)", "모바일/태블릿", "컴퓨터/노트북"],
            "가구": ["침실가구 (침대/매트리스)", "거실가구 (소파/테이블)", "주방가구 (식탁/수납장)", "수납/정리", "사무용가구", "인테리어 소품"],
            "의류": ["여성의류", "남성의류", "아동의류", "신발/잡화", "가방/지갑", "쥬얼리/시계"],
            "생활": ["세탁/청소용품", "욕실용품", "주방용품", "문구/사무용품", "반려동물용품", "자동차용품"],
            "기타": ["도서/음반", "완구/취미", "스포츠/레저", "기타"]
        };

        const contentContainer = document.getElementById("content");
        const resultsContainer = document.getElementById("results");
        const keywordInput = document.getElementById("keyword");

        // ★ 챗봇에서 상품/매장명 클릭 시 검색을 실행하는 함수 ★
        window.triggerChatSearch = function(searchTerm) {
            if (keywordInput) keywordInput.value = searchTerm;
            
            const dsTypeInput = document.getElementById("ds-type");
            const dsMinPrice = document.getElementById("ds-min-price");
            const dsMaxPrice = document.getElementById("ds-max-price");
            
            if (dsTypeInput) dsTypeInput.value = "";
            if (dsMinPrice) dsMinPrice.value = "";
            if (dsMaxPrice) dsMaxPrice.value = "";
            
            executeDetailedSearch();
        };

        // 2. 데이터 통신 (상품 불러오기)
        function fetchProducts() {
            fetch(`${backendURL}/products`)
                .then(res => res.json())
                .then(data => {
                    allProducts = data;
            
                    const urlParams = new URLSearchParams(window.location.search);
                    const storeFilter = urlParams.get('store'); 
                    const searchKeyword = urlParams.get('keyword'); 

                    if (storeFilter) {
                        currentStoreContext = storeFilter; 
                
                        if (keywordInput) {
                            keywordInput.value = ""; 
                            keywordInput.placeholder = `🔍 [${storeFilter}] 내 상품 검색...`;
                        }
                
                        const filtered = allProducts.filter(p => p.store_name === storeFilter);
                        displayAllProducts(filtered); 
                    } else if (searchKeyword) {
                        if (keywordInput) keywordInput.value = searchKeyword;
                        executeDetailedSearch();
                    } else {
                        displayAllProducts(allProducts); 
                    }
                });
        }
        
        // 3. 화면 렌더링
        function renderProductCard(p) {
            const item = document.createElement("a");
            item.classList.add("product-item-link", "product-item");
            item.href = `product-detail.html?id=${p.product_id}`;

            let imageSrc = "https://placehold.co/100x100?text=No+Image";
            if (p.image_path) {
                imageSrc = `${backendURL}${p.image_path.split(',')[0]}`;
            }

            let shortDetail = p.status_detail || "";
            if (shortDetail.length > 15) shortDetail = shortDetail.substring(0, 15) + "...";

            const categoryInfo = `${p.type || '기타'} | ${p.type_detail || ''}`;

            item.innerHTML = `
                    <img src="${imageSrc}" alt="${p.name}" class="product-image">
                    <div class="product-details">
                        <div class="product-header">
                            <span class="category-text">${categoryInfo}</span>
                            <h4>${p.name}</h4>
                            <span class="status-badge">${p.status_category || '기타'}</span>
                        </div>
                        <p class="status-reason">⚠️ ${shortDetail}</p>
                        <p class="product-price">${p.price.toLocaleString()}원</p>
                        <p class="store-info">🏪 ${p.store_name || '매장 정보 없음'}</p>
                    </div>
                `;
            return item;
        }

        function displayAllProducts(productsToDisplay) {
            contentContainer.innerHTML = "";
            productsToDisplay.forEach(p => {
                const item = renderProductCard(p);
                contentContainer.appendChild(item);
            });
        }

        // 4. 검색 및 필터링 로직
        function updateDsSubCategory() {
            const mainType = document.getElementById("ds-type").value;
            const subSelect = document.getElementById("ds-type-detail");
            subSelect.innerHTML = '<option value="">전체</option>';

            if (mainType && categoryData[mainType]) {
                categoryData[mainType].forEach(sub => {
                    const option = document.createElement("option");
                    option.value = sub;
                    option.text = sub;
                    subSelect.appendChild(option);
                });
            }
        }

        document.getElementById("detailToggleBtn").addEventListener("click", function () {
            const panel = document.getElementById("detailSearchPanel");
            if (panel.style.display === "none") {
                panel.style.display = "block";
                this.innerText = "상세 검색 ▲";
            } else {
                panel.style.display = "none";
                this.innerText = "상세 검색 ▼";
            }
        });

        function executeDetailedSearch() {
            const keyword = keywordInput ? keywordInput.value.toLowerCase().trim() : "";
            const typeInput = document.getElementById("ds-type");
            const type = typeInput ? typeInput.value : "";
            const typeDetailInput = document.getElementById("ds-type-detail");
            const typeDetail = typeDetailInput ? typeDetailInput.value : "";
            const statusInput = document.getElementById("ds-status");
            const status = statusInput ? statusInput.value : "";
            const expiryTypeInput = document.getElementById("ds-expiry-type");
            const expiryType = expiryTypeInput ? expiryTypeInput.value : "";
            const expiryDateInput = document.getElementById("ds-expiry-date");
            const expiryDate = expiryDateInput ? expiryDateInput.value : "";
            const minPriceInput = document.getElementById("ds-min-price");
            const maxPriceInput = document.getElementById("ds-max-price");
            const minPrice = minPriceInput && minPriceInput.value ? parseInt(minPriceInput.value) : 0;
            const maxPrice = maxPriceInput && maxPriceInput.value ? parseInt(maxPriceInput.value) : Infinity;
            const sortValue = document.getElementById("sortSelect").value;

            let filtered = allProducts;

            if (currentStoreContext) {
                filtered = filtered.filter(p => p.store_name === currentStoreContext);
            }

            if (keyword) {
                filtered = filtered.filter(p => 
                    (p.name && p.name.toLowerCase().includes(keyword)) || 
                    (p.store_name && p.store_name.toLowerCase().includes(keyword))
                );
            }

            if (type) filtered = filtered.filter(p => p.type === type);
            if (typeDetail) filtered = filtered.filter(p => p.type_detail === typeDetail);
            if (status) filtered = filtered.filter(p => p.status_category === status);
            filtered = filtered.filter(p => p.price >= minPrice && p.price <= maxPrice);

            if (expiryType === "has") {
                filtered = filtered.filter(p => p.expiry_date != null && p.expiry_date !== "");
                if (expiryDate) {
                    const targetDate = new Date(expiryDate);
                    filtered = filtered.filter(p => p.expiry_date && new Date(p.expiry_date) <= targetDate);
                }
            } else if (expiryType === "none") {
                filtered = filtered.filter(p => p.expiry_date == null || p.expiry_date === "");
            }

            if (sortValue === "priceLow") {
                filtered.sort((a, b) => a.price - b.price); 
            } else if (sortValue === "priceHigh") {
                filtered.sort((a, b) => b.price - a.price); 
            } else if (sortValue === "latest") {
                filtered.sort((a, b) => b.product_id - a.product_id); 
            }

            if (resultsContainer) resultsContainer.style.display = "none";
            if (contentContainer) {
                contentContainer.style.display = "block";
        
                if (filtered.length === 0) {
                    contentContainer.innerHTML = "<div style='text-align:center; padding: 50px;'><h3 style='color:#777;'>조건에 맞는 상품이 없습니다. 😢</h3></div>";
                } else {
                    displayAllProducts(filtered);
                }
            }
        }

        // 5. 이벤트 리스너 세팅
        document.getElementById("searchBtn").addEventListener("click", executeDetailedSearch);
        document.getElementById("executeDetailBtn").addEventListener("click", executeDetailedSearch);

        keywordInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter") executeDetailedSearch();
        });

        function initializePage() {
            if (resultsContainer) resultsContainer.style.display = "none";
            if (contentContainer) contentContainer.style.display = "block";
            fetchProducts();
        }

        // ★ AI 챗봇 프론트엔드 로직 ★
        const chatbotFab = document.getElementById('chatbot-fab');
        const chatbotWindow = document.getElementById('chatbot-window');
        const chatbotClose = document.getElementById('chatbot-close');
        const chatbotInput = document.getElementById('chatbot-input');
        const chatbotSend = document.getElementById('chatbot-send');
        const chatbotMessages = document.getElementById('chatbot-messages');

        chatbotFab.addEventListener('click', () => {
            chatbotWindow.style.display = chatbotWindow.style.display === 'none' ? 'flex' : 'none';
        });

        chatbotClose.addEventListener('click', () => {
            chatbotWindow.style.display = 'none';
        });

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            msgDiv.innerHTML = text;
            chatbotMessages.appendChild(msgDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }

        async function sendMessageToBot() {
            const text = chatbotInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            chatbotInput.value = '';

            const loadingId = "loading-" + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'bot-message');
            msgDiv.id = loadingId;
            msgDiv.innerHTML = "생각 중... 💭";
            chatbotMessages.appendChild(msgDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;

            try {
                const response = await fetch(`${backendURL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                document.getElementById(loadingId).innerHTML = data.reply.replace(/\n/g, '<br>');
                chatbotMessages.scrollTop = chatbotMessages.scrollHeight;

            } catch (error) {
                document.getElementById(loadingId).innerHTML = "서버와 연결이 끊어졌습니다. 백엔드가 켜져 있는지 확인해 주세요.";
            }
        }

        chatbotSend.addEventListener('click', sendMessageToBot);
        chatbotInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessageToBot();
        });

        // ★ 랜덤 광고 삽입 로직
        function loadRandomAds() {
            const adImages = [
                "광고 (1).jpg", 
                "광고 (2).jpg", 
                "광고 (3).jpg", 
                "광고 (4).jpg", 
                "광고 (5).jpg"
            ];

            const leftAdSlot = document.querySelector('.ad-slot-left');
            const rightAdSlot = document.querySelector('.ad-slot-right');

            const randomLeft = adImages[Math.floor(Math.random() * adImages.length)];
            let randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            
            while(randomLeft === randomRight) {
                randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            }

            if(leftAdSlot) leftAdSlot.innerHTML = `<img src="${randomLeft}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
            if(rightAdSlot) rightAdSlot.innerHTML = `<img src="${randomRight}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
        }

        // ★ 다크 모드 기억 & 토글 로직
        const darkModeBtn = document.getElementById("darkModeBtn");
        
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            if(darkModeBtn) darkModeBtn.innerText = "☀️";
        }

        if (darkModeBtn) {
            darkModeBtn.addEventListener("click", () => {
                document.body.classList.toggle("dark-mode");
                
                if (document.body.classList.contains("dark-mode")) {
                    localStorage.setItem("pickagain_dark_mode", "true"); 
                    darkModeBtn.innerText = "☀️";
                    darkModeBtn.style.transform = "rotate(180deg)"; 
                } else {
                    localStorage.setItem("pickagain_dark_mode", "false"); 
                    darkModeBtn.innerText = "🌙";
                    darkModeBtn.style.transform = "rotate(0deg)";
                }
            });
        }

        // ==========================================
        // ★ 위시 메모장 기능 (백엔드 연동) ★
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            const memoToggleBtn = document.getElementById("memo-toggle-btn");
            const memoPanel = document.getElementById("memo-panel");
            const memoList = document.getElementById("memo-list");
            const matchList = document.getElementById("memo-match-list");

            memoToggleBtn.addEventListener("click", () => memoPanel.style.display = memoPanel.style.display === "none" ? "flex" : "none");
            document.getElementById("memo-close-btn").addEventListener("click", () => memoPanel.style.display = "none");

            function getMemos() { return JSON.parse(localStorage.getItem("pickagain_memos") || "[]"); }
            function renderMemosOnly(memos) {
                memoList.innerHTML = "";
                memos.forEach((memo, index) => {
                    const priceText = memo.maxPrice > 0 ? `${memo.maxPrice.toLocaleString()}원 이하` : "가격 무관";
                    const li = document.createElement("li");
                    li.innerHTML = `<span><strong>${memo.keyword}</strong> (${priceText})</span><button class="memo-del-btn" onclick="deleteMemo(${index})">&times;</button>`;
                    memoList.appendChild(li);
                });
            }

            window.deleteMemo = function(index) {
                const memos = getMemos(); memos.splice(index, 1);
                localStorage.setItem("pickagain_memos", JSON.stringify(memos));
                renderMemosOnly(memos); fetchAndMatchMemos(memos);
            };

            document.getElementById("memo-add-btn").addEventListener("click", () => {
                const kwInput = document.getElementById("memo-keyword");
                const pxInput = document.getElementById("memo-max-price");
                if (!kwInput.value.trim()) return alert("상품명을 입력해 주세요!");

                const memos = getMemos();
                memos.push({ keyword: kwInput.value.trim(), maxPrice: parseInt(pxInput.value) || 0 });
                localStorage.setItem("pickagain_memos", JSON.stringify(memos));

                kwInput.value = ""; pxInput.value = "";
                renderMemosOnly(memos); fetchAndMatchMemos(memos);
            });

            async function fetchAndMatchMemos(memos) {
                if (memos.length === 0) {
                    matchList.innerHTML = "<li>메모를 등록하시면 알림을 드려요!</li>";
                    memoToggleBtn.innerText = `📝 위시 메모`; memoToggleBtn.style.backgroundColor = "#f39c12"; 
                    return;
                }
                matchList.innerHTML = "<li>상품 탐색 중... 🔍</li>";
                try {
                    const res = await fetch(`${backendURL}/products`);
                    const pdData = await res.json();
                    let matchCount = 0; matchList.innerHTML = "";

                    memos.forEach(memo => {
                        pdData.filter(p => p.name && p.name.toLowerCase().includes(memo.keyword.toLowerCase()) && (memo.maxPrice === 0 || p.price <= memo.maxPrice))
                            .forEach(item => {
                                matchCount++;
                                const li = document.createElement("li");
                                li.innerHTML = `<a href="product-detail.html?id=${item.product_id}">🎁 ${item.name} (${item.price.toLocaleString()}원)</a><div style="color:#7f8c8d; font-size:11px; margin-top:3px;">🏪 ${item.store_name}</div>`;
                                matchList.appendChild(li);
                            });
                    });

                    if (matchCount === 0) {
                        matchList.innerHTML = "<li>조건에 맞는 상품이 없습니다.</li>";
                        memoToggleBtn.innerText = `📝 위시 메모`; memoToggleBtn.style.backgroundColor = "#f39c12";
                    } else {
                        memoToggleBtn.innerText = `📝 위시 메모 (✨${matchCount}건 발견!)`; memoToggleBtn.style.backgroundColor = "#e74c3c"; 
                    }
                } catch (error) { matchList.innerHTML = "<li>오류가 발생했습니다.</li>"; }
            }

            const initialMemos = getMemos();
            renderMemosOnly(initialMemos); fetchAndMatchMemos(initialMemos);
        });

        // ★ 초기 실행
        window.onload = () => {
            initializePage();  
            loadRandomAds();   
        };
    </script>
</body>
</html>
