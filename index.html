<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CostReturn - 메인</title>
    <link rel="stylesheet" href="layout.css">
</head>
<body>
    <div class="navbar">
        <a href="login.html">Login/Sign Up</a>
    </div>

    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title">
                    <a href="index.html">CostReturn</a>
                </h2>
            </div>
            <input type="text" id="keyword" placeholder="상품명 또는 매장명을 입력하세요" autocomplete="off">
            <button id="searchBtn">검색</button>
            <button id="detailToggleBtn" class="detail-toggle-btn">상세 검색 ▼</button>
            <button class="alert-btn" onclick="location.href='alerts.html'">알림</button>
            <button class="map-btn" onclick="location.href='map.html'">지도</button>
            <button id="chatbot-fab" style="background-color: #2c3e50; color: white; border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: 10px; height: 38px;">
                AI 상담
            </button>
        </div>

        <div class="detail-search-panel" id="detailSearchPanel" style="display: none;">
            <div class="ds-row">
                <div class="ds-group">
                    <label>대분류</label>
                    <select id="ds-type" onchange="updateDsSubCategory()">
                        <option value="">전체</option>
                        <option value="식품">식품</option>
                        <option value="가전">가전/디지털</option>
                        <option value="가구">가구/인테리어</option>
                        <option value="의류">의류/잡화</option>
                        <option value="생활">생활용품</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>상세 카테고리</label>
                    <select id="ds-type-detail">
                        <option value="">대분류를 선택하세요</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>상품 상태</label>
                    <select id="ds-status">
                        <option value="">전체</option>
                        <option value="단순변심 반품">단순변심 반품</option>
                        <option value="포장 훼손">포장 훼손</option>
                        <option value="스크래치/흠집">스크래치/흠집</option>
                        <option value="유통기한 임박">유통기한 임박</option>
                        <option value="기능 고장">기능 고장</option>
                        <option value="전시 상품">전시 상품</option>
                    </select>
                </div>
            </div>

            <div class="ds-row">
                <div class="ds-group">
                    <label>소비기한 유무</label>
                    <select id="ds-expiry-type">
                        <option value="">상관없음</option>
                        <option value="has">소비기한 있음</option>
                        <option value="none">소비기한 없음</option>
                    </select>
                </div>
                <div class="ds-group">
                    <label>소비기한 (이 날짜 이전)</label>
                    <input type="date" id="ds-expiry-date">
                </div>
                <div class="ds-group">
                    <label>가격대 (원)</label>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" id="ds-min-price" placeholder="최소" style="width: 45%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <span>~</span>
                        <input type="number" id="ds-max-price" placeholder="최대" style="width: 45%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>
            </div>
            
            <div class="ds-footer" style="text-align: right; border-top: 1px dashed #ddd; padding-top: 15px; margin-top: 10px;">
                <button class="creat_btn" id="executeDetailBtn" style="padding: 10px 40px;">조건 적용하기</button>
            </div>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ad-column-left">
            <aside class="ad-slot ad-slot-left"><p style="text-align: center; color: #999;">(왼쪽 광고)</p></aside>
        </div>

        <main class="main-content">
            <div class="results" id="results"></div>
            <div class="content" id="content"></div>
            <div class="button-container">
                <a class="creat_btn" href="product-form.html">새글</a>
            </div>
        </main>

        <div class="ad-column-right">
            <aside class="ad-slot ad-slot-right"><p style="text-align: center; color: #999;">(오른쪽 광고)</p></aside>
        </div>
    </div>

    <div id="chatbot-window" class="chatbot-window" style="display: none;">
        <div class="chatbot-header">
            <h3 style="margin: 0; font-size: 16px;">CostReturn AI 매니저</h3>
            <button id="chatbot-close" class="chatbot-close">&times;</button>
        </div>
        <div id="chatbot-messages" class="chatbot-messages">
            <div class="message bot-message">안녕하세요. 무엇이든 물어보세요.<br><span style="font-size: 12px; color: #666;">(예: "10만원대 가성비 냉장고 찾아줘")</span></div>
        </div>
        <div class="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button id="chatbot-send">전송</button>
        </div>
    </div>

    <script>
        const backendURL = 'https://pickagain-backend.onrender.com';
        let allProducts = []; 

        // 1. 검색 로직 (통합 검색 및 가격대 필터 적용)
        function executeDetailedSearch() {
            const keyword = document.getElementById("keyword").value.toLowerCase().trim();
            const type = document.getElementById("ds-type").value;
            const typeDetail = document.getElementById("ds-type-detail").value;
            const status = document.getElementById("ds-status").value;
            const expiryType = document.getElementById("ds-expiry-type").value;
            const expiryDate = document.getElementById("ds-expiry-date").value;
            
            // 가격 필터 값 가져오기
            const minPrice = parseInt(document.getElementById("ds-min-price").value) || 0;
            const maxPrice = parseInt(document.getElementById("ds-max-price").value) || Infinity;

            let filtered = allProducts;

            // 통합 검색: 상품명 또는 매장명에 키워드 포함 시 필터링
            if (keyword) {
                filtered = filtered.filter(p => 
                    (p.name && p.name.toLowerCase().includes(keyword)) || 
                    (p.store_name && p.store_name.toLowerCase().includes(keyword))
                );
            }

            // 대분류/상세분류/상태 필터
            if (type) filtered = filtered.filter(p => p.type === type);
            if (typeDetail) filtered = filtered.filter(p => p.type_detail === typeDetail);
            if (status) filtered = filtered.filter(p => p.status_category === status);

            // 가격대 필터
            filtered = filtered.filter(p => p.price >= minPrice && p.price <= maxPrice);

            // 소비기한 필터
            if (expiryType === "has") {
                filtered = filtered.filter(p => p.expiry_date != null && p.expiry_date !== "");
                if (expiryDate) {
                    const targetDate = new Date(expiryDate);
                    filtered = filtered.filter(p => p.expiry_date && new Date(p.expiry_date) <= targetDate);
                }
            } else if (expiryType === "none") {
                filtered = filtered.filter(p => p.expiry_date == null || p.expiry_date === "");
            }

            const contentContainer = document.getElementById("content");
            contentContainer.innerHTML = "";
            if (filtered.length === 0) {
                contentContainer.innerHTML = "<div style='text-align:center; padding: 50px;'><h3 style='color:#777;'>조건에 맞는 상품이 없습니다.</h3></div>";
            } else {
                displayAllProducts(filtered);
            }
        }

        // 2. 챗봇 연동 함수
        window.triggerChatSearch = function(searchTerm) {
            document.getElementById("keyword").value = searchTerm;
            // 상세 검색창 옵션 초기화 후 통합 검색 실행
            document.getElementById("ds-min-price").value = "";
            document.getElementById("ds-max-price").value = "";
            executeDetailedSearch();
        };

        // UI 및 초기화 관련 나머지 함수들 (생략됨, 기존 코드 유지)
        function fetchProducts() {
            fetch(`${backendURL}/products`)
                .then(res => res.json())
                .then(data => { allProducts = data; displayAllProducts(allProducts); });
        }

        function displayAllProducts(products) {
            const container = document.getElementById("content");
            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "product-item";
                card.innerHTML = `<h4>${p.name}</h4><p>${p.price.toLocaleString()}원</p><p>🏪 ${p.store_name}</p>`;
                container.appendChild(card);
            });
        }

        // 이벤트 연결
        document.getElementById("searchBtn").addEventListener("click", executeDetailedSearch);
        document.getElementById("executeDetailBtn").addEventListener("click", executeDetailedSearch);
        document.getElementById("detailToggleBtn").addEventListener("click", function() {
            const panel = document.getElementById("detailSearchPanel");
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        });

        // 페이지 초기 로드
        fetchProducts();
    </script>
</body>
</html>
