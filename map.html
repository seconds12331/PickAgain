<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickAgain - 매장 지도</title>
    <link rel="stylesheet" href="layout.css">
    <style>
        #map-wrapper {
            position: relative; 
            width: 100%;
            margin-top: 20px;
        }

        #map-container {
            width: 100%;
            height: 550px;
            background-color: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            color: #adb5bd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #search-here-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2; 
            background-color: #fff;
            color: #4b6cb7;
            border: 2px solid #4b6cb7;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        #search-here-btn:hover {
            background-color: #4b6cb7;
            color: #fff;
        }

        /* 광고 여백 및 배경 투명화 */
        .ad-column-left, .ad-column-right {
            padding-top: 20px !important; 
        }
        .ad-slot {
            background: transparent !important; 
            border: none !important;
            padding: 0 !important;
            box-shadow: none !important;
        }

        /* ==========================================
           ★ 업그레이드된 위시 메모장 위젯 (자유 메모 포함)
           ========================================== */
        #memo-widget {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            font-family: 'Pretendard', sans-serif;
        }

        #memo-toggle-btn {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s, background-color 0.3s;
        }

        #memo-toggle-btn:hover {
            transform: scale(1.05);
        }

        #memo-panel {
            display: none; 
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 550px;
        }

        .memo-header {
            background: #f39c12;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memo-header h4 { margin: 0; font-size: 16px; }
        .memo-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        .simple-memo-area { padding: 15px; border-bottom: 1px solid #ddd; background: #fff; }
        .simple-memo-area textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 6px; resize: none; font-size: 13px; font-family: inherit; }

        .memo-input-area { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        .memo-input-area input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .memo-input-area button { width: 100%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }

        #memo-list { list-style: none; margin: 0; padding: 0; max-height: 100px; overflow-y: auto; }
        #memo-list li { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; align-items: center;}
        .memo-del-btn { color: #e74c3c; cursor: pointer; font-weight: bold; border: none; background: none; font-size: 16px; }

        #memo-match-area { background: #eef2ff; padding: 15px; flex: 1; overflow-y: auto; }
        #memo-match-area h5 { margin: 0 0 10px 0; color: #4b6cb7; font-size: 14px; }
        #memo-match-list { list-style: none; margin: 0; padding: 0; }
        #memo-match-list li { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #memo-match-list li a { color: #2c3e50; font-weight: bold; text-decoration: none; }

        /* 다크모드 대응 */
        body.dark-mode #map-container { background-color: #1e1e1e !important; border-color: #333 !important; color: #a4b0be !important; }
        body.dark-mode #search-here-btn { background-color: #2c2c2c !important; color: #f1f2f6 !important; border-color: #555 !important; }
        body.dark-mode #search-here-btn:hover { background-color: #4b6cb7 !important; }

        body.dark-mode #memo-panel { background: #1e1e1e; border-color: #333; }
        body.dark-mode .simple-memo-area { background: #1e1e1e; border-color: #333; }
        body.dark-mode .simple-memo-area textarea { background: #2a2a2a; color: #f1f2f6; border-color: #555; }
        body.dark-mode .memo-input-area { background: #2a2a2a; border-color: #444; }
        body.dark-mode .memo-input-area input { background: #1e1e1e; color: white; border-color: #555; }
        body.dark-mode #memo-list li { border-color: #444; color: #a4b0be; }
        body.dark-mode #memo-match-area { background: #2c3e50; }
        body.dark-mode #memo-match-list li { background: #1e1e1e; color: #f1f2f6; border: 1px solid #444; }
        body.dark-mode #memo-match-list li a { color: #55efc4; }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>
    
    <div class="navbar"><a href="login.html">Login/Sign Up</a></div>
    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title"><a href="shop.html">PickAgain</a></h2>
            </div>
            <div style="flex: 1;"></div> 
            <button class="map-btn" onclick="location.href='map.html'">지도</button>
            <button class="alert-btn" onclick="location.href='alerts.html'">알림</button>
            <button id="darkModeBtn" style="background: transparent; border: none; font-size: 24px; cursor: pointer; margin-left: 10px; transition: transform 0.3s;">
                🌙
            </button>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ad-column-left">
            <aside class="ad-slot ad-slot-left">
                <p style="text-align: center; color: #999;">(왼쪽 광고)</p>
            </aside>
        </div>

        <main class="main-content" style="max-width: 900px; width: 100%;">
            <div class="content">
                <h2 id="map-title" style="color: #4b6cb7; margin-top:0;">전체 매장 안내</h2>
                <p>지도를 통해 가까운 매장의 위치를 확인하고, 매장 이름을 클릭해 상품을 조회해 보세요.</p>
                
                <div id="map-wrapper">
                    <button id="search-here-btn">↻ 현 지도에서 검색</button>
                    <div id="map-container">
                        카카오맵 API 연결 대기 중...
                    </div>
                </div>
            </div>
        </main>

        <div class="ad-column-right">
            <aside class="ad-slot ad-slot-right">
                <p style="text-align: center; color: #999;">(오른쪽 광고)</p>
            </aside>
        </div>
    </div>

    <div id="memo-widget">
        <div id="memo-panel">
            <div class="memo-header">
                <h4>📝 위시 메모 & 알리미</h4>
                <button id="memo-close-btn">&times;</button>
            </div>
            
            <div class="simple-memo-area">
                <textarea id="simple-memo-text" placeholder="자유롭게 메모를 남겨보세요..." rows="3"></textarea>
            </div>

            <div class="memo-input-area">
                <input type="text" id="memo-keyword" placeholder="상품명 (예: 냉장고)" autocomplete="off">
                <input type="number" id="memo-max-price" placeholder="희망 최대 가격 (선택사항)" autocomplete="off">
                <button id="memo-add-btn">알림 조건 저장</button>
            </div>

            <ul id="memo-list"></ul>

            <div id="memo-match-area">
                <h5>✨ 조건에 맞는 상품 발견!</h5>
                <ul id="memo-match-list"></ul>
            </div>
        </div>
        <button id="memo-toggle-btn">📝 위시 메모</button>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3120d52a4a94a6575cb08b7ec6363881&libraries=services&autoload=false"></script>
    
    <script>
        const backendURL = 'https://pickagain-backend-1.onrender.com';

        // 1. 로그인 상태 확인
        const currentUser = localStorage.getItem("username");
        if (currentUser) {
            document.querySelector(".navbar").innerHTML = `
                <span style="color: white; margin-right: 15px;">환영합니다, <strong>${currentUser}</strong>님!</span>
                <a href="#" id="logoutBtn" style="color: #ffd700; font-weight: bold;">로그아웃</a>
            `;
            document.getElementById("logoutBtn").addEventListener("click", function(e) {
                e.preventDefault(); 
                localStorage.clear(); 
                location.href = "index.html"; 
            });
        }

        // 2. 카카오맵 초기화 및 마커 로직
        kakao.maps.load(function() {
            var mapContainer = document.getElementById('map-container');
            mapContainer.innerHTML = ''; 

            var mapOption = { 
                center: new kakao.maps.LatLng(34.760374, 127.662222),
                level: 5 
            };
            var map = new kakao.maps.Map(mapContainer, mapOption);
            
            var geocoder = new kakao.maps.services.Geocoder();
            var ps = new kakao.maps.services.Places(); 
            var infowindow = new kakao.maps.InfoWindow({ zIndex: 1, removable: true });
            var searchMarkers = []; 

            function clearMarkers() {
                for (var i = 0; i < searchMarkers.length; i++) {
                    searchMarkers[i].setMap(null);
                }
                searchMarkers = [];
            }

            function displayMarker(place) {
                var marker = new kakao.maps.Marker({
                    map: map,
                    position: new kakao.maps.LatLng(place.y, place.x)
                });
                
                searchMarkers.push(marker);

                kakao.maps.event.addListener(marker, 'click', function() {
                    var content = `
                        <div style="padding:15px; font-size:14px; width:260px; border-radius:8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
                            <a href="index.html?store=${encodeURIComponent(place.place_name)}" style="color:#2c3e50; font-size:16px; font-weight:bold; text-decoration:underline; display:inline-block; margin-bottom:5px;">🔗 ${place.place_name} 상품 보기</a><br>
                            <span style="color:#7f8fa6; font-size:12px;">${place.road_address_name || place.address_name}</span><br>
                            <span style="color:#27ae60; font-size:13px; font-weight:bold; margin-top:5px; display:block;">📞 ${place.phone || '전화번호 없음'}</span>
                        </div>
                    `;
                    infowindow.setContent(content);
                    infowindow.open(map, marker);
                });
            }

            function placesSearchCB(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    for (var i = 0; i < data.length; i++) {
                        displayMarker(data[i]);
                    }
                }
            }

            function searchPlacesInBounds() {
                var bounds = map.getBounds(); 
                ps.keywordSearch('리퍼브', placesSearchCB, { bounds: bounds, size: 15 });
                ps.keywordSearch('반품', placesSearchCB, { bounds: bounds, size: 15 });
            }

            function searchNearbyRefurbished() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        var imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png'; 
                        var imageSize = new kakao.maps.Size(64, 69); 
                        var imageOption = {offset: new kakao.maps.Point(27, 69)}; 
                        var markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);

                        var locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                        map.setCenter(locPosition);

                        var myMarker = new kakao.maps.Marker({ 
                            map: map, 
                            position: locPosition,
                            image: markerImage
                        });

                        infowindow.setContent('<div style="padding:5px; font-size:12px; color:#e74c3c; font-weight:bold;">내 위치</div>');
                        infowindow.open(map, myMarker);

                        searchPlacesInBounds(); 
                    });
                } else {
                    searchPlacesInBounds();
                }
            }

            document.getElementById('search-here-btn').addEventListener('click', function() {
                infowindow.close(); 
                clearMarkers();
                searchPlacesInBounds(); 
            });

            const urlParams = new URLSearchParams(window.location.search);
            const targetStore = urlParams.get('store');
            const targetAddress = urlParams.get('address');

            if (targetStore && targetAddress && targetAddress !== "-") {
                document.getElementById('map-title').innerText = ` ${targetStore} 위치 안내`;

                geocoder.addressSearch(targetAddress, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                        map.setCenter(coords);
                        
                        var targetMarker = new kakao.maps.Marker({ map: map, position: coords });
                        
                        var content = `
                            <div style="padding:15px; min-width:200px; border-radius:8px;">
                                <a href="index.html?store=${encodeURIComponent(targetStore)}" style="color:#4b6cb7; font-size:16px; font-weight:bold; text-decoration:underline; display:block; margin-bottom:5px;">🔗 ${targetStore} 상품 보기</a>
                                <span style="color:#666; font-size:12px;">${targetAddress}</span>
                            </div>`;
                        infowindow.setContent(content);
                        infowindow.open(map, targetMarker);
                    } else {
                        alert(`안내: [${targetStore}]의 등록된 주소가 올바르지 않아 매장 위치를 표시할 수 없습니다.\n전체 매장 지도로 전환합니다.`);
                        document.getElementById('map-title').innerText = `전체 매장 안내`;
                        
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(function(position) {
                                var locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                                var myMarker = new kakao.maps.Marker({ map: map, position: locPosition });
                                map.setLevel(8); 
                                searchPlacesInBounds(); 
                            });
                        }
                    }
                });
            } else {
                document.getElementById('map-title').innerText = `내 주변 리퍼브 매장 찾기`;
                searchNearbyRefurbished();
            }
        });
        
        // 3. 광고 설정
        function loadRandomAds() {
            const adImages = [
                "광고 (1).jpg", 
                "광고 (2).jpg", 
                "광고 (3).jpg", 
                "광고 (4).jpg", 
                "광고 (5).jpg"
            ];

            const leftAdSlot = document.querySelector('.ad-slot-left');
            const rightAdSlot = document.querySelector('.ad-slot-right');

            const randomLeft = adImages[Math.floor(Math.random() * adImages.length)];
            let randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            
            while(randomLeft === randomRight) {
                randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            }

            if(leftAdSlot) leftAdSlot.innerHTML = `<img src="${randomLeft}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
            if(rightAdSlot) rightAdSlot.innerHTML = `<img src="${randomRight}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
        }

        // 4. 다크모드 스위치
        const darkModeBtn = document.getElementById("darkModeBtn");
        
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            if(darkModeBtn) darkModeBtn.innerText = "☀️";
        }

        if (darkModeBtn) {
            darkModeBtn.addEventListener("click", () => {
                document.body.classList.toggle("dark-mode");
                
                if (document.body.classList.contains("dark-mode")) {
                    localStorage.setItem("pickagain_dark_mode", "true"); 
                    darkModeBtn.innerText = "☀️";
                    darkModeBtn.style.transform = "rotate(180deg)"; 
                } else {
                    localStorage.setItem("pickagain_dark_mode", "false"); 
                    darkModeBtn.innerText = "🌙";
                    darkModeBtn.style.transform = "rotate(0deg)";
                }
            });
        }

        // ==========================================
        // ★ 5. 업그레이드된 위시 메모장 기능
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            const memoToggleBtn = document.getElementById("memo-toggle-btn");
            const memoPanel = document.getElementById("memo-panel");
            const memoCloseBtn = document.getElementById("memo-close-btn");
            const simpleMemoText = document.getElementById("simple-memo-text");
            const memoList = document.getElementById("memo-list");
            const matchList = document.getElementById("memo-match-list");

            if (localStorage.getItem("pickagain_memo_state") === "open") memoPanel.style.display = "flex";

            memoToggleBtn.addEventListener("click", () => {
                const isHidden = memoPanel.style.display === "none" || memoPanel.style.display === "";
                memoPanel.style.display = isHidden ? "flex" : "none";
                localStorage.setItem("pickagain_memo_state", isHidden ? "open" : "closed");
            });

            memoCloseBtn.addEventListener("click", () => {
                memoPanel.style.display = "none";
                localStorage.setItem("pickagain_memo_state", "closed");
            });

            simpleMemoText.value = localStorage.getItem("pickagain_simple_memo") || "";
            simpleMemoText.addEventListener("input", (e) => localStorage.setItem("pickagain_simple_memo", e.target.value));

            function getMemos() { return JSON.parse(localStorage.getItem("pickagain_memos") || "[]"); }
            
            function renderMemosOnly(memos) {
                memoList.innerHTML = "";
                memos.forEach((memo, index) => {
                    const priceText = memo.maxPrice > 0 ? `${memo.maxPrice.toLocaleString()}원 이하` : "가격 무관";
                    const li = document.createElement("li");
                    li.innerHTML = `<span><strong>${memo.keyword}</strong> (${priceText})</span><button class="memo-del-btn" onclick="deleteMemo(${index})">&times;</button>`;
                    memoList.appendChild(li);
                });
            }

            window.deleteMemo = function(index) {
                const memos = getMemos(); memos.splice(index, 1);
                localStorage.setItem("pickagain_memos", JSON.stringify(memos));
                renderMemosOnly(memos); fetchAndMatchMemos(memos);
            };

            document.getElementById("memo-add-btn").addEventListener("click", () => {
                const kwInput = document.getElementById("memo-keyword");
                const pxInput = document.getElementById("memo-max-price");
                if (!kwInput.value.trim()) return alert("상품명을 입력해 주세요!");

                const memos = getMemos();
                memos.push({ keyword: kwInput.value.trim(), maxPrice: parseInt(pxInput.value) || 0 });
                localStorage.setItem("pickagain_memos", JSON.stringify(memos));

                kwInput.value = ""; pxInput.value = "";
                renderMemosOnly(memos); fetchAndMatchMemos(memos);
            });

            async function fetchAndMatchMemos(memos) {
                if (memos.length === 0) {
                    matchList.innerHTML = "<li>메모를 등록하시면 알림을 드려요!</li>";
                    memoToggleBtn.innerText = `📝 위시 메모`; 
                    memoToggleBtn.style.backgroundColor = "#f39c12"; 
                    return;
                }

                matchList.innerHTML = "<li>상품 탐색 중... 🔍</li>";

                try {
                    const res = await fetch(`${backendURL}/products`);
                    const pdData = await res.json();
                    let matchCount = 0; matchList.innerHTML = "";

                    memos.forEach(memo => {
                        pdData.filter(p => p.name && p.name.toLowerCase().includes(memo.keyword.toLowerCase()) && (memo.maxPrice === 0 || p.price <= memo.maxPrice))
                            .forEach(item => {
                                matchCount++;
                                const li = document.createElement("li");
                                li.innerHTML = `<a href="product-detail.html?id=${item.product_id}">🎁 ${item.name} (${item.price.toLocaleString()}원)</a><div style="color:#7f8c8d; font-size:11px; margin-top:3px;">🏪 ${item.store_name}</div>`;
                                matchList.appendChild(li);
                            });
                    });

                    if (matchCount === 0) {
                        matchList.innerHTML = "<li>조건에 맞는 상품이 없습니다.</li>";
                        memoToggleBtn.innerText = `📝 위시 메모`; 
                        memoToggleBtn.style.backgroundColor = "#f39c12";
                    } else {
                        memoToggleBtn.innerText = `📝 위시 메모 (✨${matchCount}건 발견!)`; 
                        memoToggleBtn.style.backgroundColor = "#e74c3c"; 
                    }
                } catch (error) { 
                    matchList.innerHTML = "<li>오류가 발생했습니다.</li>"; 
                }
            }

            const initialMemos = getMemos();
            renderMemosOnly(initialMemos); fetchAndMatchMemos(initialMemos);
        });

        window.onload = () => {
            loadRandomAds();
        };
    </script>
</body>
</html>
