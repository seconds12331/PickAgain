<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickAgain - 매장 지도</title>
    <link rel="stylesheet" href="layout.css">
    <style>
        #map-container {
            width: 100%;
            height: 550px;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            margin-top: 20px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="login.html">Login/Sign Up</a>
    </div>

    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title">
                    <a href="index.html">PickAgain</a>
                </h2>
            </div>
            <div style="flex: 1;"></div> 
            
            <button class="map-btn" onclick="location.href='map.html'">지도</button>
            <button class="alert-btn" onclick="location.href='alerts.html'">알림</button>
        </div>
    </div>

    <div class="page-wrapper">
        <main class="main-content" style="max-width: 900px; width: 100%;">
        <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3120d52a4a94a6575cb08b7ec6363881"></script>
            <script>
		        var container = document.getElementById('map');
		        var options = {
			        center: new kakao.maps.LatLng(33.450701, 126.570667),
			        level: 3
		        };

        		var map = new kakao.maps.Map(container, options);
	        </script>
            <div class="content">
                <h2 id="map-title" style="color: #4b6cb7; margin-top:0;">전체 매장 안내</h2>
                <p>지도를 통해 가까운 매장의 위치와 재고 정보를 확인하실 수 있습니다.</p>
                
                <div id="map-container">
                    카카오맵 API 연결 대기 중...
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. 로그인 상태 유지 (상단바 처리)
        const currentUser = localStorage.getItem("username");
        const navbar = document.querySelector(".navbar");

        if (currentUser) {
            navbar.innerHTML = `
                <span style="color: white; margin-right: 15px;">환영합니다, <strong>${currentUser}</strong>님!</span>
                <a href="#" id="logoutBtn" style="color: #ffd700; font-weight: bold;">로그아웃</a>
            `;
            document.getElementById("logoutBtn").addEventListener("click", function(e) {
                e.preventDefault();
                localStorage.clear();
                alert("로그아웃 되었습니다.");
                location.href = "index.html"; 
            });
        }

        // 2. 상세페이지에서 넘어온 매장 특정 기능
        const urlParams = new URLSearchParams(window.location.search);
        const targetStore = urlParams.get('store');

        if (targetStore) {
            document.getElementById('map-title').innerText = `📍 ${targetStore} 위치 안내`;
        }
    </script>
</body>
</html>
