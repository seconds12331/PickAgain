<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickAgain - 매장 지도</title>
    <link rel="stylesheet" href="layout.css">
    <style>
        /* 지도가 들어갈 영역 임시 스타일 */
        #map-container {
            width: 150%;
            height: 500px;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="login.html">Login/Sign Up</a>
    </div>

    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title">
                    <a href="index.html">PickAgain</a>
                </h2>
            </div>
            <button class="alert-btn" onclick="location.href='alerts.html'">
                알림
            </button>
            <button class="map-btn" onclick="location.href='map.html'">
                지도
            </button>
        </div>

    <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <h2 id="map-title">전체 매장 지도</h2>
        
        <div id="map-container">
            카카오맵 API 로딩 준비 중...
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetStore = urlParams.get('store');

        if (targetStore) {
            document.getElementById('map-title').innerText = `${targetStore} 위치 안내`;
            console.log(`[준비 완료] 카카오맵이 연결되면 '${targetStore}' 좌표로 자동 이동합니다.`);
        }
    </script>
</body>
</html>
