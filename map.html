<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickAgain - 매장 지도</title>
    <link rel="stylesheet" href="layout.css">
    <style>
        #map-wrapper {
            position: relative; 
            width: 100%;
            margin-top: 20px;
        }

        #map-container {
            width: 100%;
            height: 550px;
            background-color: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            color: #adb5bd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #search-here-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2; 
            background-color: #fff;
            color: #4b6cb7;
            border: 2px solid #4b6cb7;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        #search-here-btn:hover {
            background-color: #4b6cb7;
            color: #fff;
        }

        /* ★ 광고 위아래 여백 제거 및 투명화 강제 적용 */
        .ad-column-left, .ad-column-right {
            padding-top: 20px !important; /* 상단 여백 최소화 */
        }
        .ad-slot {
            background: transparent !important; /* 하얀색 배경 강제 투명화 */
            border: none !important;
            padding: 0 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>
    
    <div class="navbar"><a href="login.html">Login/Sign Up</a></div>
    <div class="search-container">
        <div class="search-bar-row">
            <div class="title-container">
                <h2 class="Title"><a href="shop.html">PickAgain</a></h2>
            </div>
            <div style="flex: 1;"></div> 
            <button class="map-btn" onclick="location.href='map.html'">지도</button>
            <button class="alert-btn" onclick="location.href='alerts.html'">알림</button>
            <button id="darkModeBtn" style="background: transparent; border: none; font-size: 24px; cursor: pointer; margin-left: 10px; transition: transform 0.3s;">
                🌙
            </button>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ad-column-left">
            <aside class="ad-slot ad-slot-left">
                <p style="text-align: center; color: #999;">(왼쪽 광고)</p>
            </aside>
        </div>

        <main class="main-content" style="max-width: 900px; width: 100%;">
            <div class="content">
                <h2 id="map-title" style="color: #4b6cb7; margin-top:0;">전체 매장 안내</h2>
                <p>지도를 통해 가까운 매장의 위치를 확인하고, 매장 이름을 클릭해 상품을 조회해 보세요.</p>
                
                <div id="map-wrapper">
                    <button id="search-here-btn">↻ 현 지도에서 검색</button>
                    <div id="map-container">
                        카카오맵 API 연결 대기 중...
                    </div>
                </div>
            </div>
        </main>

        <div class="ad-column-right">
            <aside class="ad-slot ad-slot-right">
                <p style="text-align: center; color: #999;">(오른쪽 광고)</p>
            </aside>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3120d52a4a94a6575cb08b7ec6363881&libraries=services&autoload=false"></script>
    
    <script>
        const currentUser = localStorage.getItem("username");
        if (currentUser) {
            document.querySelector(".navbar").innerHTML = `
                <span style="color: white; margin-right: 15px;">환영합니다, <strong>${currentUser}</strong>님!</span>
                <a href="#" id="logoutBtn" style="color: #ffd700; font-weight: bold;">로그아웃</a>
            `;
            document.getElementById("logoutBtn").addEventListener("click", function(e) {
                e.preventDefault(); 
                localStorage.clear(); 
                location.href = "index.html"; 
            });
        }

        kakao.maps.load(function() {
            var mapContainer = document.getElementById('map-container');
            mapContainer.innerHTML = ''; 

            var mapOption = { 
                center: new kakao.maps.LatLng(34.760374, 127.662222),
                level: 5 
            };
            var map = new kakao.maps.Map(mapContainer, mapOption);
            
            var geocoder = new kakao.maps.services.Geocoder();
            var ps = new kakao.maps.services.Places(); 
            var infowindow = new kakao.maps.InfoWindow({ zIndex: 1, removable: true });
            var searchMarkers = []; 

            function clearMarkers() {
                for (var i = 0; i < searchMarkers.length; i++) {
                    searchMarkers[i].setMap(null);
                }
                searchMarkers = [];
            }

            function displayMarker(place) {
                var marker = new kakao.maps.Marker({
                    map: map,
                    position: new kakao.maps.LatLng(place.y, place.x)
                });
                
                searchMarkers.push(marker);

                kakao.maps.event.addListener(marker, 'click', function() {
                    var content = `
                        <div style="padding:15px; font-size:14px; width:260px; border-radius:8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
                            <a href="index.html?store=${encodeURIComponent(place.place_name)}" style="color:#2c3e50; font-size:16px; font-weight:bold; text-decoration:underline; display:inline-block; margin-bottom:5px;">🔗 ${place.place_name} 상품 보기</a><br>
                            <span style="color:#7f8fa6; font-size:12px;">${place.road_address_name || place.address_name}</span><br>
                            <span style="color:#27ae60; font-size:13px; font-weight:bold; margin-top:5px; display:block;">📞 ${place.phone || '전화번호 없음'}</span>
                        </div>
                    `;
                    infowindow.setContent(content);
                    infowindow.open(map, marker);
                });
            }

            function placesSearchCB(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    for (var i = 0; i < data.length; i++) {
                        displayMarker(data[i]);
                    }
                }
            }

            function searchPlacesInBounds() {
                var bounds = map.getBounds(); 
                ps.keywordSearch('리퍼브', placesSearchCB, { bounds: bounds, size: 15 });
                ps.keywordSearch('반품', placesSearchCB, { bounds: bounds, size: 15 });
            }

            function searchNearbyRefurbished() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        var imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png'; 
                        var imageSize = new kakao.maps.Size(64, 69); 
                        var imageOption = {offset: new kakao.maps.Point(27, 69)}; 
                        var markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);

                        var locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                        map.setCenter(locPosition);

                        var myMarker = new kakao.maps.Marker({ 
                            map: map, 
                            position: locPosition,
                            image: markerImage
                        });

                        infowindow.setContent('<div style="padding:5px; font-size:12px; color:#e74c3c; font-weight:bold;">내 위치</div>');
                        infowindow.open(map, myMarker);

                        searchPlacesInBounds(); 
                    });
                } else {
                    searchPlacesInBounds();
                }
            }

            document.getElementById('search-here-btn').addEventListener('click', function() {
                infowindow.close(); 
                clearMarkers();
                searchPlacesInBounds(); 
            });

            const urlParams = new URLSearchParams(window.location.search);
            const targetStore = urlParams.get('store');
            const targetAddress = urlParams.get('address');

            if (targetStore && targetAddress && targetAddress !== "-") {
                document.getElementById('map-title').innerText = ` ${targetStore} 위치 안내`;

                geocoder.addressSearch(targetAddress, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                        map.setCenter(coords);
                        
                        var targetMarker = new kakao.maps.Marker({ map: map, position: coords });
                        
                        var content = `
                            <div style="padding:15px; min-width:200px; border-radius:8px;">
                                <a href="index.html?store=${encodeURIComponent(targetStore)}" style="color:#4b6cb7; font-size:16px; font-weight:bold; text-decoration:underline; display:block; margin-bottom:5px;">🔗 ${targetStore} 상품 보기</a>
                                <span style="color:#666; font-size:12px;">${targetAddress}</span>
                            </div>`;
                        infowindow.setContent(content);
                        infowindow.open(map, targetMarker);
                    } else {
                        alert(`안내: [${targetStore}]의 등록된 주소가 올바르지 않아 매장 위치를 표시할 수 없습니다.\n전체 매장 지도로 전환합니다.`);
                        document.getElementById('map-title').innerText = `전체 매장 안내`;
                        
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(function(position) {
                                var locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                                var myMarker = new kakao.maps.Marker({ map: map, position: locPosition });
                                map.setLevel(8); 
                                searchPlacesInBounds(); 
                            });
                        }
                    }
                });
            } else {
                document.getElementById('map-title').innerText = `내 주변 리퍼브 매장 찾기`;
                searchNearbyRefurbished();
            }
        });
        
        // ==========================================
        // ★ 랜덤 광고 삽입 로직 (여백 제거 로직 적용!)
        // ==========================================
        function loadRandomAds() {
            const adImages = [
                "광고 (1).jpg", 
                "광고 (2).jpg", 
                "광고 (3).jpg", 
                "광고 (4).jpg", 
                "광고 (5).jpg"
            ];

            const leftAdSlot = document.querySelector('.ad-slot-left');
            const rightAdSlot = document.querySelector('.ad-slot-right');

            const randomLeft = adImages[Math.floor(Math.random() * adImages.length)];
            let randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            
            while(randomLeft === randomRight) {
                randomRight = adImages[Math.floor(Math.random() * adImages.length)];
            }

            // ★ height: auto; 와 display: block; 으로 이미지가 영역 전체를 군더더기 없이 채우게 만듭니다.
            if(leftAdSlot) leftAdSlot.innerHTML = `<img src="${randomLeft}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
            if(rightAdSlot) rightAdSlot.innerHTML = `<img src="${randomRight}" style="width:100%; height:auto; display:block; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">`;
        }

        // ==========================================
        // ★ 다크 모드 기억 & 토글 로직
        // ==========================================
        const darkModeBtn = document.getElementById("darkModeBtn");
        
        if (localStorage.getItem("pickagain_dark_mode") === "true") {
            if(darkModeBtn) darkModeBtn.innerText = "☀️";
        }

        if (darkModeBtn) {
            darkModeBtn.addEventListener("click", () => {
                document.body.classList.toggle("dark-mode");
                
                if (document.body.classList.contains("dark-mode")) {
                    localStorage.setItem("pickagain_dark_mode", "true"); 
                    darkModeBtn.innerText = "☀️";
                    darkModeBtn.style.transform = "rotate(180deg)"; 
                } else {
                    localStorage.setItem("pickagain_dark_mode", "false"); 
                    darkModeBtn.innerText = "🌙";
                    darkModeBtn.style.transform = "rotate(0deg)";
                }
            });
        }

        window.onload = () => {
            loadRandomAds();
        };
    </script>
</body>
</html>
